<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>استعادة كلمة المرور - دكان الحارة</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #f8f8f8, #eaeaea);
      text-align: center;
      margin: 0;
    }

    .container {
      max-width: 420px;
      width: 90%;
      margin: 40px auto;
      background: #fff;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
    }

    button:disabled {
      background: #9e9e9e;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }

    .notice {
      margin-top: 15px;
      font-size: 13px;
      background: #fff8e1;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.png" />

  <h2>🔐 استعادة كلمة المرور</h2>

  <input type="password" id="password" placeholder="كلمة المرور الجديدة" />
  <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" />

  <div style="text-align:right;font-size:13px;">
    ✔ 6 أحرف على الأقل<br>
    ✔ حرف كبير<br>
    ✔ رقم
  </div>

  <button id="btn">تغيير كلمة المرور</button>

  <p id="message" class="message"></p>

  <div class="notice">
    ⚠️ في حال لم تقم بطلب تغيير كلمة المرور، تجاهل الرسالة.
  </div>

</div>

<script>
  const SUPABASE_URL = "https://kcxzsnrqdzgfkbvshsgu.supabase.co";
  const SUPABASE_KEY = "YOUR_ANON_KEY";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let sessionReady = false;

  async function init() {
    try {
      // 🔥 قراءة التوكن من الرابط (#)
      const hash = window.location.hash;

      if (!hash.includes("access_token")) {
        console.log("No recovery token");
        return;
      }

      const params = new URLSearchParams(hash.replace("#", "?"));
      const access_token = params.get("access_token");
      const refresh_token = params.get("refresh_token");

      if (access_token && refresh_token) {
        const { error } = await supabaseClient.auth.setSession({
          access_token,
          refresh_token
        });

        if (!error) {
          sessionReady = true;
          console.log("Session Ready ✅");
        } else {
          console.error(error);
        }
      }

    } catch (e) {
      console.error("Init error", e);
    }
  }

  init();

  function validatePassword(password) {
    return /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/.test(password);
  }

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const msg = document.getElementById("message");
    const btn = document.getElementById("btn");

    msg.innerText = "";

    try {
      btn.disabled = true;
      btn.innerText = "⏳ جاري التنفيذ...";

      if (!sessionReady) {
        msg.innerText = "❌ الرابط غير صالح أو انتهت صلاحيته";
        msg.className = "message error";
        btn.disabled = false;
        btn.innerText = "تغيير كلمة المرور";
        return;
      }

      if (!validatePassword(password)) {
        msg.innerText = "❌ كلمة المرور ضعيفة";
        msg.className = "message error";
        btn.disabled = false;
        btn.innerText = "تغيير كلمة المرور";
        return;
      }

      if (password !== confirm) {
        msg.innerText = "❌ كلمة المرور غير متطابقة";
        msg.className = "message error";
        btn.disabled = false;
        btn.innerText = "تغيير كلمة المرور";
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) throw error;

      msg.innerText = "✅ تم تغيير كلمة المرور بنجاح";
      msg.className = "message success";

    } catch (e) {
      msg.innerText = "❌ حدث خطأ";
      msg.className = "message error";
      btn.disabled = false;
      btn.innerText = "تغيير كلمة المرور";
      console.error(e);
    }
  }

  document.getElementById("btn").addEventListener("click", resetPassword);
</script>

</body>
</html>

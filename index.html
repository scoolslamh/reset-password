<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>استعادة كلمة المرور - دكان الحارة</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #f8f8f8, #eaeaea);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      width: 90%;
      margin: 40px auto;
      background: #fff;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      background: #256628;
    }

    button:disabled {
      background: #9e9e9e;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

    .rules {
      font-size: 13px;
      color: #666;
      text-align: right;
      margin: 10px 0;
      line-height: 1.6;
    }

    .notice {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
      background: #fff8e1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ffe082;
      line-height: 1.6;
    }

    .loading {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" alt="دكان الحارة" />

    <h2>🔐 استعادة كلمة المرور</h2>

    <input type="password" id="password" placeholder="كلمة المرور الجديدة" />
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" />

    <div class="rules">
      يجب أن تحتوي كلمة المرور على:<br>
      ✔ 6 أحرف على الأقل<br>
      ✔ حرف كبير (A-Z)<br>
      ✔ رقم (0-9)
    </div>

    <button id="btn" onclick="resetPassword()">تغيير كلمة المرور</button>

    <p id="loading" class="loading"></p>
    <p id="message" class="message"></p>

    <div class="notice">
      ⚠️ في حال لم تقم بطلب تغيير كلمة المرور، يرجى تجاهل هذه الرسالة
      أو التواصل مع إدارة التطبيق.
    </div>

  </div>

  <script>
    const SUPABASE_URL = "YOUR_URL";
    const SUPABASE_KEY = "YOUR_ANON_KEY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let sessionReady = false;

    // 🔥 الطريقة الأساسية
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === "PASSWORD_RECOVERY") {
        sessionReady = true;
        console.log("Session Ready via event ✅");
      }
    });

    // 🔥 fallback مهم جدًا
    async function handleSessionFallback() {
      const hash = window.location.hash;

      if (hash && hash.includes("access_token")) {
        const params = new URLSearchParams(hash.substring(1));

        const access_token = params.get("access_token");
        const refresh_token = params.get("refresh_token");

        if (access_token && refresh_token) {
          await supabaseClient.auth.setSession({
            access_token,
            refresh_token,
          });

          sessionReady = true;
          console.log("Session Ready via fallback ✅");
        }
      }
    }

    handleSessionFallback();

    function validatePassword(password) {
      const regex = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;
      return regex.test(password);
    }

    async function resetPassword() {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const message = document.getElementById("message");
      const loading = document.getElementById("loading");
      const btn = document.getElementById("btn");

      message.innerText = "";
      message.className = "message";

      if (!sessionReady) {
        message.innerText = "❌ الرابط غير صالح أو انتهت صلاحيته";
        message.classList.add("error");
        return;
      }

      if (!validatePassword(password)) {
        message.innerText = "❌ كلمة المرور يجب أن تحتوي على 6 أحرف + حرف كبير + رقم";
        message.classList.add("error");
        return;
      }

      if (password !== confirmPassword) {
        message.innerText = "❌ كلمة المرور غير متطابقة";
        message.classList.add("error");
        return;
      }

      try {
        btn.disabled = true;
        loading.innerText = "⏳ جاري تحديث كلمة المرور...";

        const { error } = await supabaseClient.auth.updateUser({
          password: password
        });

        if (error) throw error;

        loading.innerText = "";
        message.innerText = "✅ تم تغيير كلمة المرور بنجاح";
        message.classList.add("success");

        await supabaseClient.auth.signOut();

        // 🔥 تحويل للتطبيق (اختياري)
        setTimeout(() => {
          window.location.href = "haymarket://reset-password";
        }, 2000);

      } catch (err) {
        loading.innerText = "";
        message.innerText = err.message || "❌ حدث خطأ";
        message.classList.add("error");
        btn.disabled = false;
        console.error(err);
      }
    }
  </script>

</body>
</html>

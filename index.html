<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>استعادة كلمة المرور - دكان الحارة</title>

  <!-- ✅ تحميل صحيح -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #f8f8f8, #eaeaea);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 420px;
      width: 90%;
      margin: 40px auto;
      background: #fff;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }

    .rules {
      font-size: 13px;
      text-align: right;
    }

    .notice {
      margin-top: 15px;
      font-size: 13px;
      background: #fff8e1;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.png" />

  <h2>🔐 استعادة كلمة المرور</h2>

  <input type="password" id="password" placeholder="كلمة المرور الجديدة" />
  <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" />

  <div class="rules">
    ✔ 6 أحرف على الأقل<br>
    ✔ حرف كبير<br>
    ✔ رقم
  </div>

  <button id="btn">تغيير كلمة المرور</button>

  <p id="message" class="message"></p>

  <div class="notice">
    ⚠️ في حال لم تقم بطلب تغيير كلمة المرور، تجاهل الرسالة.
  </div>

</div>

<script>
  const SUPABASE_URL = "https://kcxzsnrqdzgfkbvshsgu.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjeHpzbnJxZHpnZmtidnNoc2d1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjQwNTMsImV4cCI6MjA4ODg0MDA1M30.dx61LP2sYI2HfxClklfKYv9sJ1TYVzpJYyQ2PJSA-Gw"; // حط المفتاح هنا

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let sessionReady = false;

  // استخراج التوكن
  async function handleSession() {
  try {
    const { data, error } = await supabaseClient.auth.exchangeCodeForSession(
      window.location.href
    );

    if (error) throw error;

    if (data.session) {
      sessionReady = true;
      console.log("Session Ready via code ✅");
    }
  } catch (e) {
    console.log("No code session", e);
  }
}

handleSession();

  function validatePassword(password) {
    return /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/.test(password);
  }

  async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    const msg = document.getElementById("message");

    msg.innerText = "";

    if (!sessionReady) {
      msg.innerText = "❌ الرابط غير صالح";
      msg.className = "message error";
      return;
    }

    if (!validatePassword(password)) {
      msg.innerText = "❌ كلمة المرور ضعيفة";
      msg.className = "message error";
      return;
    }

    if (password !== confirm) {
      msg.innerText = "❌ غير متطابقة";
      msg.className = "message error";
      return;
    }

    const { error } = await supabaseClient.auth.updateUser({
      password: password
    });

    if (error) {
      msg.innerText = error.message;
      msg.className = "message error";
      return;
    }

    msg.innerText = "✅ تم التغيير بنجاح";
    msg.className = "message success";
  }

  // ربط الزر
  document.getElementById("btn").addEventListener("click", resetPassword);
</script>

</body>
</html>

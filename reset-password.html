<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>استعادة كلمة المرور - دكان الحارة</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom, #f8f8f8, #eaeaea);
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #256628;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

    .rules {
      font-size: 12px;
      color: #666;
      text-align: right;
      margin: 10px 0;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 🛒 شعار التطبيق -->
    <img src="logo.png" alt="دكان الحارة" />

    <h2>🔐 استعادة كلمة المرور</h2>

    <input type="password" id="password" placeholder="كلمة المرور الجديدة" />
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" />

    <div class="rules">
      يجب أن تحتوي كلمة المرور على:<br>
      ✔ 6 أحرف على الأقل<br>
      ✔ حرف كبير (A-Z)<br>
      ✔ رقم (0-9)
    </div>

    <button onclick="resetPassword()">تغيير كلمة المرور</button>

    <p id="message" class="message"></p>

  </div>

  <script>
    const SUPABASE_URL = "YOUR_URL";
    const SUPABASE_KEY = "YOUR_ANON_KEY";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function validatePassword(password) {
      const regex = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;
      return regex.test(password);
    }

    async function resetPassword() {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const message = document.getElementById("message");

      message.innerText = "";
      message.className = "message";

      // ✅ تحقق
      if (!validatePassword(password)) {
        message.innerText = "❌ كلمة المرور يجب أن تحتوي على 6 أحرف + حرف كبير + رقم";
        message.classList.add("error");
        return;
      }

      if (password !== confirmPassword) {
        message.innerText = "❌ كلمة المرور غير متطابقة";
        message.classList.add("error");
        return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: password
        });

        if (error) throw error;

        message.innerText = "✅ تم تغيير كلمة المرور بنجاح";
        message.classList.add("success");

      } catch (err) {
        message.innerText = "❌ حدث خطأ، حاول مرة أخرى";
        message.classList.add("error");
        console.error(err);
      }
    }
  </script>

</body>
</html>
